name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - feat/llm-backend
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: productpilot

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub ────────────────────────────────────────────────────────
      # Secrets needed: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      # Create a token at https://hub.docker.com/settings/security
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── AWS ECR (alternative — uncomment and remove Docker Hub steps) ─────
      # Secrets needed: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, ECR_REPOSITORY
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      # - name: Log in to Amazon ECR
      #   id: ecr-login
      #   uses: aws-actions/amazon-ecr-login@v2

      # ── GCP Artifact Registry (alternative) ──────────────────────────────
      # Secrets needed: GCP_SA_KEY (service account JSON), GCP_PROJECT_ID, GCP_REGION
      # - name: Log in to GCP Artifact Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
      #     username: _json_key
      #     password: ${{ secrets.GCP_SA_KEY }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          # For ECR: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}
          # For GCP: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
